name: 📊 Hakatime Stats

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY:  ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          WAKATIME_API_URL:  https://hackatime.hackclub.com/api/
          SHOW_OS:           "True"
          SHOW_PROJECTS:     "True"
          SHOW_EDITORS:      "True"
          SHOW_TIMEZONE:     "False"
          SHOW_LINES_OF_CODE: "False"
          TIME_RANGE:        last_7_days
          LOCALE:            "en"